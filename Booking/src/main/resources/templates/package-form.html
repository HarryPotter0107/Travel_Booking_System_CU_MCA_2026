<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title th:text="${travelPackage.id != null ? 'Edit Package' : 'Add New Package'}"></title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <script th:src="@{/js/scripts.js}"></script>
</head>
<body  class="packages-form">
<h1 th:text="${travelPackage.id != null ? 'Edit Package' : 'Add New Package'}"></h1>
<form th:action="@{${travelPackage.id != null} ? '/packages/update/' + ${travelPackage.id} : '/packages/add'}" method="post">
    <label for="destination">Destination:</label>
    <input type="text" id="destination" name="destination" th:value="${travelPackage.destination}" required>

    <label for="duration">Duration (Days):</label>
    <input type="number" id="duration" name="duration" th:value="${travelPackage.duration}" required>

    <label for="price">Price:</label>
    <input type="text" id="price" name="price" th:value="${travelPackage.price}" required>

    <label for="description">Description:</label>
    <textarea id="description" name="description" th:text="${travelPackage.description}" required></textarea>

    <button type="submit" th:text="${travelPackage.id != null ? 'Update' : 'Add'}"></button>
</form>
<a th:href="@{/packages}">Back to Packages</a>


<footer>
    <p>&copy; Bhanu Upadhyay MCA 2026. All rights reserved.</p>
</footer>
</body>
</html>
